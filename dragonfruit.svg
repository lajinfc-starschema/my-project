<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="30" ry="32" fill="#F472B6"/>
  <!-- Pink highlights -->
  <ellipse cx="42" cy="50" rx="8" ry="10" fill="#F9A8D4" opacity="0.5"/>

  <!-- Green scale tips around body -->
  <!-- Bottom scales -->
  <ellipse cx="35" cy="84" rx="5" ry="9" fill="#86EFAC" transform="rotate(-20 35 84)"/>
  <ellipse cx="50" cy="88" rx="5" ry="9" fill="#4ADE80" transform="rotate(0 50 88)"/>
  <ellipse cx="65" cy="84" rx="5" ry="9" fill="#86EFAC" transform="rotate(20 65 84)"/>

  <!-- Side scales left -->
  <ellipse cx="22" cy="65" rx="5" ry="9" fill="#4ADE80" transform="rotate(-40 22 65)"/>
  <ellipse cx="20" cy="50" rx="5" ry="9" fill="#86EFAC" transform="rotate(-50 20 50)"/>

  <!-- Side scales right -->
  <ellipse cx="78" cy="65" rx="5" ry="9" fill="#4ADE80" transform="rotate(40 78 65)"/>
  <ellipse cx="80" cy="50" rx="5" ry="9" fill="#86EFAC" transform="rotate(50 80 50)"/>

  <!-- Top crown leaves -->
  <ellipse cx="38" cy="30" rx="5" ry="14" fill="#4ADE80" transform="rotate(-20 38 30)"/>
  <ellipse cx="50" cy="25" rx="5" ry="16" fill="#22C55E" transform="rotate(0 50 25)"/>
  <ellipse cx="62" cy="30" rx="5" ry="14" fill="#4ADE80" transform="rotate(20 62 30)"/>
  <ellipse cx="28" cy="36" rx="4" ry="11" fill="#86EFAC" transform="rotate(-35 28 36)"/>
  <ellipse cx="72" cy="36" rx="4" ry="11" fill="#86EFAC" transform="rotate(35 72 36)"/>

  <!-- Body on top of scales -->
  <ellipse cx="50" cy="56" rx="28" ry="30" fill="#F472B6"/>
  <ellipse cx="42" cy="48" rx="7" ry="9" fill="#F9A8D4" opacity="0.45"/>

  <!-- Cute face -->
  <!-- Eyes -->
  <circle cx="43" cy="54" r="3.5" fill="#1a1a1a"/>
  <circle cx="57" cy="54" r="3.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="44.5" cy="52.5" r="1.2" fill="white"/>
  <circle cx="58.5" cy="52.5" r="1.2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="38" cy="60" rx="5" ry="3" fill="#FB7185" opacity="0.5"/>
  <ellipse cx="62" cy="60" rx="5" ry="3" fill="#FB7185" opacity="0.5"/>
  <!-- Smile -->
  <path d="M 44 63 Q 50 68 56 63" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

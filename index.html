<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>火龙果's Shanghai Eats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="apple-touch-icon" href="hlg-avatar.svg" />
</head>
<body>

  <header>
    <div class="hero">
      <button id="lang-btn" class="lang-btn">EN</button>
      <div class="hero-text">
        <img src="hlg-avatar.svg" alt="火龙果" class="hero-logo" />
        <p class="subtitle">吃商天花板·火龙果的</p>
        <div class="hero-title-wrap">
          <h1>「上海好吃地图」</h1>
          <div class="stamp" aria-hidden="true">
            <div class="stamp-face">小众点评</div>
          </div>
        </div>
        <p class="restaurant-count-line" id="restaurant-count"></p>
        <p class="rating-explainer">一果<img src="rating-icon.png" alt="🐉" class="rating-explainer-icon">到三果<img src="rating-icon.png" alt="🐉" class="rating-explainer-icon"><img src="rating-icon.png" alt="🐉" class="rating-explainer-icon"><img src="rating-icon.png" alt="🐉" class="rating-explainer-icon">，均为火龙果回国必吃之选 · 果级越高，越是火龙果的心头最爱</p>
        <p class="byob-tip">🍷火龙果温馨提示：上海所有餐厅均可自带酒水和奶茶🧋</p>
        <div class="authors-toggle open" id="authors-toggle">
          <span class="authors-toggle-text">关于作者</span>
          <span class="authors-toggle-icon">&#8964;</span>
        </div>
        <div class="authors-inner hero-authors open" id="authors-panel">
          <div class="author-card">
            <a href="https://www.linkedin.com/in/yuanke-deng-14a65b370/" target="_blank" rel="noopener">
              <img class="author-avatar" src="hlg-photo.jpg" alt="火龙果" />
            </a>
            <a class="author-name" href="https://www.linkedin.com/in/yuanke-deng-14a65b370/" target="_blank" rel="noopener">火龙果</a>
            <div class="author-title">首席内容官</div>
            <div class="author-bio">阿姆中餐天花板🌷·WSET二级Distinction🍷<br>八卦情报局领导班子👀·花木邓亚萍🏓</div>
          </div>
          <div class="author-divider"></div>
          <div class="author-card">
            <a href="https://www.linkedin.com/in/jjroxylai/" target="_blank" rel="noopener">
              <img class="author-avatar" src="lj.jpg" alt="拉筋" />
            </a>
            <a class="author-name" href="https://www.linkedin.com/in/jjroxylai/" target="_blank" rel="noopener">拉筋</a>
            <div class="author-title">Claude Code 发言人</div>
            <div class="author-bio">裸辞牛马，现壮如牛马🐄；有多壮就有多能吃😋<br>🏃‍♀️半马PB144，全马PB353，Hyrox女单126💪</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="tag-filters">
      <div class="tag-filter-pane">
        <span class="tag-filter-label" data-type="category">🍽 菜系</span>
        <div class="tag-filter-btns">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="jiangzhe">江浙小海鲜 🐟</button>
          <button class="filter-btn" data-filter="sichuan">川菜 🌶️🌶️</button>
          <button class="filter-btn" data-filter="hunan">湘菜 🌶️🌶️🌶️</button>
          <button class="filter-btn" data-filter="jiangxi">江西菜 🌶️🌶️🌶️🌶️🌶️</button>
          <button class="filter-btn" data-filter="yunguizhou">云贵菜 🍄</button>
          <button class="filter-btn" data-filter="japanese">日料 🍣</button>
          <button class="filter-btn" data-filter="domestic">国内其他 🦆</button>
          <button class="filter-btn" data-filter="international">国外其他 🥩</button>
          <button class="filter-btn" data-filter="bakery">面包甜品 🥐</button>
          <button class="filter-btn" data-filter="bar">酒吧 🍸</button>
        </div>
      </div>
      <div class="tag-filter-pane">
        <span class="tag-filter-label" data-type="occasion">🎉 场合</span>
        <div class="tag-filter-btns">
          <button class="tag-btn tag-all-btn" data-type="occasion" data-tag="__all__">全部</button>
          <button class="tag-btn" data-type="occasion" data-tag="一人食">一人食</button>
          <button class="tag-btn" data-type="occasion" data-tag="朋友聚餐">朋友聚餐</button>
          <button class="tag-btn" data-type="occasion" data-tag="家庭聚餐">家庭聚餐</button>
          <button class="tag-btn" data-type="occasion" data-tag="可以请客">可以请客</button>
        </div>
      </div>
      <div class="tag-filter-pane">
        <span class="tag-filter-label" data-type="atmosphere">🏠 氛围</span>
        <div class="tag-filter-btns">
          <button class="tag-btn tag-all-btn" data-type="atmosphere" data-tag="__all__">全部</button>
          <button class="tag-btn" data-type="atmosphere" data-tag="热闹">热闹</button>
          <button class="tag-btn" data-type="atmosphere" data-tag="安静">安静</button>
          <button class="tag-btn" data-type="atmosphere" data-tag="精致">精致</button>
          <button class="tag-btn" data-type="atmosphere" data-tag="简单">简单</button>
        </div>
      </div>
      <div class="tag-filter-pane">
        <span class="tag-filter-label" data-type="group">👥 人数</span>
        <div class="tag-filter-btns">
          <button class="tag-btn tag-all-btn" data-type="group" data-tag="__all__">全部</button>
          <button class="tag-btn" data-type="group" data-tag="一人可行">一人可行</button>
          <button class="tag-btn" data-type="group" data-tag="2–6人">2–6人</button>
          <button class="tag-btn" data-type="group" data-tag="6人以上">6人以上</button>
          <button class="tag-btn" data-type="group" data-tag="有包间">有包间</button>
        </div>
      </div>
    </section>

    <section class="grid" id="restaurant-grid"></section>
  </main>

  <section class="guestbook">
    <h2 class="guestbook-title"><img src="hlg-avatar.svg" alt="🐉" class="guestbook-icon"> 留言板</h2>
    <p class="guestbook-subtitle">吃过了吗？有什么想说的？</p>

    <div id="guestbook-comments"></div>

    <form id="guestbook-form" class="guestbook-form">
      <input type="text" id="guestbook-name" placeholder="你的名字（选填，默认匿名）" class="guestbook-input" />
      <textarea id="guestbook-content" placeholder="留下你的想法..." class="guestbook-textarea" required></textarea>
      <button type="submit" class="guestbook-submit">留言 →</button>
    </form>
    <p id="guestbook-status" class="guestbook-status"></p>
  </section>

  <footer>
    <p>火啦火啦工作室出品·上海·阿姆斯特丹</p>
  </footer>

  <!-- SVG filter for ink stamp effect -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="ink-stamp" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="12" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <feComposite in="displaced" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <script src="restaurants.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script src="guestbook.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/shgoodeats/service-worker.js');
    }
  </script>
</body>
</html>
